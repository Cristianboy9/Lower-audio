<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Editor -2dB MP3</title>
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>
<style>
body{
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
    padding:40px;
}
.container{
    background:#2f2f55;
    padding:30px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
}
button{
    background:#628ED9;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<h2>🎧 Normalize Audio to -2 dB (MP3 Output)</h2>
<input type="file" id="audioFile" accept="audio/*"><br><br>
<button onclick="processAudio()">Process</button>
<br><br>
<a id="downloadLink" style="display:none;color:white;font-weight:bold;"></a>
</div>

<script>
async function processAudio(){
    const file = document.getElementById("audioFile").files[0];
    if(!file) return alert("Upload a file first.");

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

    let max = 0;
    for(let c=0;c<audioBuffer.numberOfChannels;c++){
        let data = audioBuffer.getChannelData(c);
        for(let i=0;i<data.length;i++){
            max = Math.max(max, Math.abs(data[i]));
        }
    }

    const targetLinear = Math.pow(10, -2/20);
    const gainValue = targetLinear / max;

    let samples = audioBuffer.getChannelData(0);
    let mp3encoder = new lamejs.Mp3Encoder(1, audioBuffer.sampleRate, 192);

    let mp3Data = [];
    let blockSize = 1152;

    for(let i=0;i<samples.length;i+=blockSize){
        let chunk = samples.subarray(i, i+blockSize);
        let adjusted = new Int16Array(chunk.length);

        for(let j=0;j<chunk.length;j++){
            let s = chunk[j] * gainValue;
            s = Math.max(-1, Math.min(1, s));
            adjusted[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }

        let mp3buf = mp3encoder.encodeBuffer(adjusted);
        if(mp3buf.length > 0) mp3Data.push(mp3buf);
    }

    let end = mp3encoder.flush();
    if(end.length > 0) mp3Data.push(end);

    let blob = new Blob(mp3Data, {type: 'audio/mp3'});
    let url = URL.createObjectURL(blob);

    let link = document.getElementById("downloadLink");
    link.href = url;
    link.download = "audio_-2dB.mp3";
    link.style.display = "block";
    link.innerText = "⬇ Download MP3 (-2 dB)";
}
</script>

</body>
</html>
