<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Enhancer</title>

<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#1e1e2f;
    color:white;
    text-align:center;
    padding:40px;
}
.container{
    background:#2f2f55;
    padding:30px;
    border-radius:15px;
    max-width:550px;
    margin:auto;
}
button{
    background:#628ED9;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#97AAEC;
}

/* Toggle Switch */
.switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 30px;
  margin-top: 15px;
}

.switch input { display: none; }

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #444;
  transition: .4s;
  border-radius: 30px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 22px; width: 22px;
  left: 4px; bottom: 4px;
  background-color: white;
  transition: .4s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #628ED9;
}

input:checked + .slider:before {
  transform: translateX(30px);
}

a{
    color:white;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
<h2>🎧 Audio Enhancer</h2>

<input type="file" id="audioFile" accept="audio/*"><br>

<p>Distortion Fix</p>

<label class="switch">
  <input type="checkbox" id="fixToggle">
  <span class="slider"></span>
</label>

<br><br>

<button onclick="processAudio()">Process Audio</button>

<br><br>

<a id="downloadLink" style="display:none;"></a>

</div>

<script>
async function processAudio(){

    const file = document.getElementById("audioFile").files[0];
    if(!file) return alert("Please upload an audio file first.");

    const fixDistortion = document.getElementById("fixToggle").checked;

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

    let samples = audioBuffer.getChannelData(0);

    // === Normalize to -2 dB ===
    let max = 0;
    for(let i = 0; i < samples.length; i++){
        max = Math.max(max, Math.abs(samples[i]));
    }

    const targetLinear = Math.pow(10, -2 / 20);
    const gainValue = targetLinear / max;

    const processed = new Float32Array(samples.length);

    for(let i = 0; i < samples.length; i++){
        let s = samples[i] * gainValue;

        if(fixDistortion){
            // Soft limiter
            s = Math.tanh(s * 1.5);

            // Extra peak smoothing
            if(Math.abs(s) > 0.85){
                s *= 0.92;
            }
        }

        processed[i] = s;
    }

    // === MP3 Encoding ===
    const mp3encoder = new lamejs.Mp3Encoder(
        1,
        audioBuffer.sampleRate,
        192
    );

    const mp3Data = [];
    const blockSize = 1152;

    for(let i = 0; i < processed.length; i += blockSize){

        const chunk = processed.subarray(i, i + blockSize);
        const intChunk = new Int16Array(chunk.length);

        for(let j = 0; j < chunk.length; j++){
            let s = Math.max(-1, Math.min(1, chunk[j]));
            intChunk[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }

        const mp3buf = mp3encoder.encodeBuffer(intChunk);
        if(mp3buf.length > 0) mp3Data.push(mp3buf);
    }

    const end = mp3encoder.flush();
    if(end.length > 0) mp3Data.push(end);

    const blob = new Blob(mp3Data, {type: 'audio/mp3'});
    const url = URL.createObjectURL(blob);

    const link = document.getElementById("downloadLink");
    link.href = url;
    link.download = "enhanced_-2dB.mp3";
    link.style.display = "block";
    link.innerText = "⬇ Download Enhanced MP3";
}
</script>

</body>
</html>
