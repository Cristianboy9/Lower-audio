<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Normalizer -2dB</title>

<!-- MP3 Encoder -->
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#1e1e2f;
    color:white;
    text-align:center;
    padding:40px;
}
.container{
    background:#2f2f55;
    padding:30px;
    border-radius:15px;
    max-width:500px;
    margin:auto;
}
button{
    background:#628ED9;
    border:none;
    padding:10px 20px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#97AAEC;
}
a{
    color:white;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="container">
<h2>🎧 Normalize Audio to -2 dB (MP3 Output)</h2>

<input type="file" id="audioFile" accept="audio/*"><br><br>

<button onclick="processAudio()">Process Audio</button>

<br><br>

<a id="downloadLink" style="display:none;"></a>

</div>

<script>
async function processAudio(){

    const file = document.getElementById("audioFile").files[0];
    if(!file) return alert("Please upload an audio file first.");

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuffer = await file.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

    // Find current peak
    let max = 0;
    for(let c = 0; c < audioBuffer.numberOfChannels; c++){
        const data = audioBuffer.getChannelData(c);
        for(let i = 0; i < data.length; i++){
            max = Math.max(max, Math.abs(data[i]));
        }
    }

    // Convert -2 dB to linear scale
    const targetLinear = Math.pow(10, -2 / 20);
    const gainValue = targetLinear / max;

    // Use first channel (mono encoding for simplicity)
    const samples = audioBuffer.getChannelData(0);

    const mp3encoder = new lamejs.Mp3Encoder(
        1,
        audioBuffer.sampleRate,
        192 // bitrate kbps
    );

    const mp3Data = [];
    const blockSize = 1152;

    for(let i = 0; i < samples.length; i += blockSize){

        const chunk = samples.subarray(i, i + blockSize);
        const adjusted = new Int16Array(chunk.length);

        for(let j = 0; j < chunk.length; j++){
            let s = chunk[j] * gainValue;
            s = Math.max(-1, Math.min(1, s));
            adjusted[j] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }

        const mp3buf = mp3encoder.encodeBuffer(adjusted);
        if(mp3buf.length > 0) mp3Data.push(mp3buf);
    }

    const end = mp3encoder.flush();
    if(end.length > 0) mp3Data.push(end);

    const blob = new Blob(mp3Data, {type: 'audio/mp3'});
    const url = URL.createObjectURL(blob);

    const link = document.getElementById("downloadLink");
    link.href = url;
    link.download = "normalized_-2dB.mp3";
    link.style.display = "block";
    link.innerText = "⬇ Download MP3 (-2 dB)";
}
</script>

</body>
</html>
